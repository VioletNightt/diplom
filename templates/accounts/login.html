{% extends "base.html" %}
{% block title %}Вход{% endblock %}
{% block content %}
<section class="auth-card">
    <h1>Вход</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.non_field_errors }}
        {% for field in form %}
            <label>
                <span>{{ field.label }}</span>
                {{ field }}
                {% if field.errors %}<small class="error">{{ field.errors|join:", " }}</small>{% endif %}
            </label>
        {% endfor %}
        <button class="button wide" type="submit">Войти</button>
    </form>
    <p class="muted">Нет аккаунта? <a href="{% url 'register-page' %}">Зарегистрируйтесь</a>.</p>
</section>
{% endblock %}
